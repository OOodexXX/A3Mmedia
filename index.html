<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3M Print Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">A3M Print</div>
            <ul class="nav-links">
                <li><a href="#" class="t-key" data-key="home">الرئيسية</a></li>
                <li><a href="pages/account.html" class="t-key" data-key="account">حسابي</a></li>
            </ul>
            <div class="cart-icon" onclick="document.getElementById('cartModal').classList.add('open')">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="tabs-container">
            <button class="tab-btn active" data-category="all">الكل</button>
            <button class="tab-btn" data-category="tshirts">تيشرتات</button>
            <button class="tab-btn" data-category="mugs">أكواب</button>
        </section>

        <section id="productsContainer" class="products-grid">
            </section>
    </main>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="this.parentElement.parentElement.classList.remove('open')">&times;</span>
            <h2>سلة المشتريات</h2>
            <div id="cartItems"></div>
            <div class="cart-summary">
                <p>المجموع: <span id="cart-subtotal">0</span> DZD</p>
                <p>خصم الجملة (20%): <span id="cart-discount">0</span> DZD</p>
                <hr>
                <h3>الإجمالي: <span id="cart-total">0</span> DZD</h3>
            </div>
            <button class="checkout-btn" onclick="checkout()">إتمام الطلب</button>
        </div>
    </div>
    
<script src="js/data.js"></script>

<script src="js/firebase.js" type="module"></script>

<script src="js/auth.js" type="module"></script>

<script src="js/designer.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>
</body>
</html>
