<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام الطلب - A3M Print</title>
    <link rel="stylesheet" href="../css/style.css"> </head>
<body>
    <div class="checkout-container">
        <h2>تفاصيل الشحن والدفع</h2>
        <div id="checkoutItems"></div> <div class="summary">
            <p>المجموع: <span id="check-subtotal">0</span> DZD</p>
            <p>الخصم (20%): <span id="check-discount">0</span> DZD</p>
            <hr>
            <h3>الإجمالي: <span id="check-total">0</span> DZD</h3>
        </div>

        <form id="checkoutForm">
            <input type="text" id="custName" placeholder="الاسم الكامل" required>
            <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
            <textarea id="custAddress" placeholder="العنوان بالتفصيل" required></textarea>
            <button type="submit" id="submitOrderBtn">تأكيد الطلب</button>
        </form>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/firebase.js" type="module"></script>
    <script src="../js/checkout.js" type="module"></script>
</body>
</html>
